name: Compile tinymesa

on:
  workflow_dispatch:
  schedule:
    - cron: '15 0 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - 'meson.build'
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.tag }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-22.04-arm, macos-14 ]
        tag: [ mesa-25.2.7 ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup tinymesa
        uses: ./.github/actions/setup
      - name: Clone mesa
        run: git clone --depth 1 --branch ${{ matrix.tag }} https://gitlab.freedesktop.org/mesa/mesa.git ${{ github.workspace }}/mesa
      - name: Patch mesa
        run: ./apply_patches.py ${{ github.workspace }}/mesa ${{ matrix.tag }}
      - name: Build mesa
        shell: bash
        run: |
          cd ${{ github.workspace }}/mesa
          export CLANG_PATH=$(which clang-20)
          meson setup build/ -Db_staticpic=true -Dgallium-drivers=llvmpipe -Dplatforms="[]" -Dglx=disabled -Dvulkan-drivers=swrast,nouveau,freedreno -Dopengl=false -Degl=disabled -Dgbm=disabled -Dvideo-codecs="[]"
          EXT=$([[ "${{ runner.os }}" == "macOS" ]] && echo ".dylib" || echo ".so")
          ninja -C build src/tinymesa/libtinymesa$EXT src/tinymesa/libtinymesa_cpu$EXT
      - name: Build wheel
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION_ARG=(--tag "$GITHUB_REF_NAME")
          else
            VERSION_ARG=(--sha "${GITHUB_SHA::7}")
          fi
          ./build_wheel.py "${VERSION_ARG[@]}" ${{ matrix.tag }} ${{ github.workspace }}/mesa/build/src/tinymesa/libtinymesa*${{ runner.os == 'macOS' && '.dylib' || '.so' }}
      - name: Test loading with ctypes
        run: |
          pip install dist/*.whl
          python3 -c "from ctypes import CDLL; from tinymesa import libtinymesa, libtinymesa_cpu; CDLL(libtinymesa).glsl_type_singleton_init_or_ref(), CDLL(libtinymesa_cpu).glsl_type_singleton_init_or_ref()"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinymesa-whl-${{ matrix.tag }}-${{ matrix.os }}
          path: dist/
  release:
    name: Release tinymesa
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/tinymesa
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
